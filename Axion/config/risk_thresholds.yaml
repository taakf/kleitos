# Axion Risk Alert Thresholds — REFERENCE ONLY
#
# NOTE: This file is NOT loaded by the application.
# Risk thresholds are configured in config/settings.yaml under the "risk:" section.
# This file is kept as a reference for all available threshold parameters.
# To change thresholds, edit the corresponding values in settings.yaml.

concentration:
  # Maximum weight per single holding (percentage)
  max_single_name_pct: 10.0
  single_name_severity: warning  # warning or critical

  # Maximum weight per sector
  max_sector_pct: 30.0
  sector_severity: warning

  # Maximum weight per geography
  max_geography_pct: 40.0
  geography_severity: warning

  # Maximum weight per currency
  max_currency_pct: 50.0
  currency_severity: info

  # Maximum weight per theme
  max_theme_pct: 25.0
  theme_severity: info

calendar:
  # Alert when N or more events cluster within X days
  cluster_min_events: 3
  cluster_window_days: 5
  cluster_severity: info

  # Alert on upcoming earnings within X days
  earnings_lookahead_days: 14
  earnings_severity: info

  # Alert on upcoming ex-dividend within X days
  exdiv_lookahead_days: 7
  exdiv_severity: info

coverage:
  # Alert when a holding has no events for X days
  max_days_without_event: 14
  stale_severity: warning

  # Alert when a holding has missed an expected earnings report
  missed_earnings_severity: critical

  # Alert when a holding has no analyst coverage
  no_analyst_coverage_severity: info

materiality:
  # Minimum materiality to generate an alert
  alert_threshold: important  # watch, important, or critical

  # Minimum materiality for immediate notification
  immediate_threshold: critical

thesis_drift:
  # How many negative signals before thesis drift alert
  negative_signal_count: 3
  negative_signal_window_days: 30
  drift_severity: warning

dividend_concentration:
  # Alert when more than this % of holdings have dividends in the same month
  max_same_month_pct: 30

correlation:
  # Alert when >N% of holdings share both the same sector AND geography
  max_same_sector_geo_pct: 50
  # Alert when >N% of holdings are in the same sector regardless of geography
  max_same_sector_pct: 60
