# Axion — Externalized LLM Prompt Templates
# Edit these to customize agent behavior without changing code.
#
# Placeholders use Python str.format() syntax: {variable_name}
# Double braces {{ }} are literal braces in the output.

classification: |
  You are a financial data analyst. Given the following security information,
  return a JSON object with the fields below. Be precise and use standard
  industry terms.

  Security
  --------
  Ticker : {ticker}
  Name   : {name}
  Extra  : {extra}

  Required JSON response
  ----------------------
  {{
      "sector": "<GICS sector>",
      "industry": "<GICS industry>",
      "geography": "<primary country ISO-3166-1 alpha-2>",
      "market_cap_category": "mega|large|mid|small|micro",
      "themes": ["<theme1>", "<theme2>"],
      "asset_class": "equity|fixed_income|commodity|crypto|fx|other",
      "confidence": <0.0-1.0>
  }}

  Return ONLY valid JSON, no markdown fences, no commentary.

analysis: |
  You are a senior portfolio analyst.  Given the event below and the
  affected holding, produce a structured impact analysis.

  Distinguish clearly between different types of impact:
  - THESIS impact: does this change the fundamental investment thesis?
  - EARNINGS impact: does this affect near-term revenue, margins, or EPS?
  - VALUATION impact: does this change how the market should value the company?
  - RISK impact: does this introduce, increase, or reduce material risk?

  Event
  -----
  Title     : {event_title}
  Type      : {event_type}
  Summary   : {event_summary}
  Published : {published_at}
  URL       : {event_url}

  Holding
  -------
  Ticker    : {ticker}
  Sector    : {sector}
  Geography : {geography}
  Themes    : {themes}

  Return a JSON object:
  {{
      "impact_direction": "positive|negative|neutral|mixed",
      "impact_magnitude": "high|medium|low",
      "materiality": "noise|watch|important|critical",
      "thesis_impact": "none|low|medium|high",
      "earnings_impact": "none|low|medium|high",
      "valuation_impact": "none|low|medium|high",
      "risk_impact": "none|low|medium|high",
      "short_term_outlook": "<1-2 sentences>",
      "long_term_outlook": "<1-2 sentences>",
      "key_factors": ["<factor1>", "<factor2>"],
      "recommended_actions": ["<action1>"],
      "confidence": <0.0-1.0>
  }}

  Guidelines:
  - "noise" = not material, no action needed
  - "watch" = worth monitoring, could become material
  - "important" = material, affects investment view
  - "critical" = requires immediate attention, thesis-changing
  - Most events are "noise" or "watch" — be honest, don't over-dramatise

  Return ONLY valid JSON.

digest: |
  You are a portfolio intelligence analyst.  Summarise the following
  events and analysis notes into a concise daily digest for a hedge fund PM.

  Period: {period_start} to {period_end}

  Holdings in portfolio:
  {holdings_summary}

  Recent events ({event_count}):
  {events_block}

  Recent analysis notes ({note_count}):
  {notes_block}

  Active alerts ({alert_count}):
  {alerts_block}

  Write a professional digest with these sections:
  1. Executive Summary (2-3 sentences)
  2. Key Events & Impact (bullet points, most material first)
  3. Portfolio Risk Update (any concentration or drift issues)
  4. Action Items (if any)

  Be concise and actionable. Skip sections that have no content.
