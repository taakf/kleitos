# Axion System Configuration
# Environment-specific overrides go in ~/.axion.env (or ~/.kleitos.env for backward compat)

system:
  name: axion
  version: "1.0.0"
  environment: production

api:
  host: "127.0.0.1"   # Bind to localhost only; set to 0.0.0.0 for LAN access
  port: 7777
  workers: 1           # Single worker for SQLite safety
  auth_enabled: true   # Requires API key (set via KLEITOS_API_KEY env var); localhost exempt
  rate_limit_rpm: 100
  cors_origins:
    - "http://localhost:7777"
    - "http://127.0.0.1:7777"

database:
  wal_mode: true
  journal_size_limit: 67108864  # 64MB
  busy_timeout: 5000            # 5 seconds

scheduler:
  collection:
    interval_minutes: 30
    max_concurrent: 1
  digest:
    time: "07:00"               # Local time
    timezone: "local"
  health_check:
    interval_minutes: 5
  backup:
    time: "02:00"               # 2 AM local
    retention_days: 7
  analysis:
    interval_minutes: 30        # Run event analysis after collection
  classification:
    interval_hours: 6           # Re-check classifications
  coverage_qa:
    interval_hours: 4
  risk_check:
    interval_hours: 1

llm:
  provider: anthropic
  model: claude-sonnet-4-6      # Good balance of speed/quality
  analysis_model: claude-sonnet-4-6  # Can upgrade to opus for deeper analysis
  max_tokens: 4096
  temperature: 0.1              # Low temperature for consistency
  timeout_seconds: 60
  max_retries: 3
  retry_backoff_seconds: [2, 5, 15]

macro_screening:
  enabled: true                 # Send unlinked events to LLM for indirect impact detection
  batch_size: 20                # Headlines per LLM call
  max_batches_per_run: 5        # Cap LLM calls per collection cycle (cost control)
  min_confidence: 0.2           # Ignore screenings below this confidence

impact_mapping:
  min_relevance_threshold: 0.3
  materiality_levels:
    - immaterial
    - watch
    - important
    - critical
  confidence_levels:
    - low
    - medium
    - high
  max_llm_scoring_batch: 10

risk:
  concentration:
    max_single_name_pct: 10.0
    max_sector_pct: 30.0
    max_geography_pct: 40.0
    max_currency_pct: 50.0
    max_theme_pct: 25.0
  calendar:
    cluster_threshold_days: 5
    cluster_min_events: 3
  stale_data:
    max_days_without_event: 14
    max_days_without_price: 3
  dividend_concentration:
    max_same_month_pct: 30.0
  correlation:
    max_same_sector_geo_pct: 50.0
    max_same_sector_pct: 60.0

logging:
  level: INFO
  format: json
  max_file_size_mb: 50
  backup_count: 10
  log_dir: "~/kleitos-data/logs"  # Uses legacy data dir for backward compatibility

dashboard:
  enabled: true
  theme: light
  refresh_interval_seconds: 60
