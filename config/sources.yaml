# Axion Source Registry / Allowlist
# Only sources listed here can be fetched by the Collection Agent
# Add new sources here and restart the scheduler

sources:
  # ============================================
  # FREE / PUBLIC SOURCES
  # ============================================

  - id: reuters-rss
    name: Reuters Business News
    domain: rssfeeds.reuters.com
    type: rss
    url: https://www.rssfeeds.reuters.com/reuters/businessNews
    parser: rss_generic
    priority: 1
    trust_level: premium
    enabled: false  # Domain no longer resolves; re-enable if Reuters restores this URL
    rate_limit_rpm: 5
    requires_auth: false
    tags: [general, corporate, macro]
    description: "Major wire service, global business coverage"

  - id: yahoo-finance-rss
    name: Yahoo Finance
    domain: finance.yahoo.com
    type: rss
    url: https://finance.yahoo.com/news/rssindex
    parser: rss_generic
    priority: 2
    trust_level: standard
    enabled: false  # RSS endpoint retired by Yahoo; re-enable if a working feed URL is found
    rate_limit_rpm: 5
    requires_auth: false
    tags: [general, corporate, market]
    description: "Broad financial news coverage"

  - id: sec-edgar
    name: SEC EDGAR Full-Text Search
    domain: efts.sec.gov
    type: api
    url: https://efts.sec.gov/LATEST/search-index
    parser: sec_edgar
    priority: 1
    trust_level: premium
    enabled: false
    unsupported: true
    rate_limit_rpm: 10
    requires_auth: false
    tags: [filings, regulatory, us, corporate]
    description: "US SEC filings and corporate disclosures"
    notes: "Parser not implemented in this build. Toggling enabled has no effect; needs the sec_edgar parser before it can fetch."

  - id: fed-rss
    name: Federal Reserve Press Releases
    domain: federalreserve.gov
    type: rss
    url: https://www.federalreserve.gov/feeds/press_all.xml
    parser: rss_generic
    priority: 2
    trust_level: premium
    enabled: true
    rate_limit_rpm: 5
    requires_auth: false
    tags: [macro, rates, us, central_bank]
    description: "Federal Reserve monetary policy and press releases"

  - id: ecb-rss
    name: ECB Press Releases
    domain: ecb.europa.eu
    type: rss
    url: https://www.ecb.europa.eu/rss/press.html
    parser: rss_generic
    priority: 2
    trust_level: premium
    enabled: true
    rate_limit_rpm: 5
    requires_auth: false
    tags: [macro, rates, eu, central_bank]
    description: "European Central Bank policy and press releases"

  # ============================================
  # COMPANY-SPECIFIC NEWS SOURCES (highest value for portfolio matching)
  # ============================================

  - id: google-news-business
    name: Google News Business
    domain: news.google.com
    type: rss
    url: https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGx6TVdZU0FtVnVHZ0pWVXlnQVAB?hl=en-US&gl=US&ceid=US:en
    parser: rss_generic
    priority: 1
    trust_level: premium
    enabled: true
    rate_limit_rpm: 5
    requires_auth: false
    tags: [corporate, market, earnings, general]
    description: "Google News Business section — broad company-specific coverage with ticker mentions"

  - id: google-news-earnings
    name: Google News Earnings
    domain: news.google.com
    type: rss
    url: https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGx6TVdZU0FtVnVHZ0pWVXlnQVAB?hl=en-US&gl=US&ceid=US:en
    parser: rss_generic
    priority: 1
    trust_level: standard
    enabled: false  # Same topic feed as google-news-business — disabled to avoid duplicates
    rate_limit_rpm: 3
    requires_auth: false
    tags: [earnings, corporate, analyst]
    description: "Google News US Business (duplicate of google-news-business — disabled)"

  # ============================================
  # EUROPEAN / INTERNATIONAL COVERAGE
  # ============================================

  - id: wsj-markets
    name: WSJ Markets
    domain: feeds.a.dj.com
    type: rss
    url: https://feeds.a.dj.com/rss/RSSMarketsMain.xml
    parser: rss_generic
    priority: 1
    trust_level: premium
    enabled: true
    rate_limit_rpm: 5
    requires_auth: false
    tags: [market, corporate, macro, commodity]
    description: "Wall Street Journal markets feed — premium US/global market and company coverage"

  - id: google-news-uk
    name: Google News UK Business
    domain: news.google.com
    type: rss
    url: https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGx6TVdZU0FtVnVHZ0pWVXlnQVAB?hl=en-GB&gl=GB&ceid=GB:en
    parser: rss_generic
    priority: 2
    trust_level: standard
    enabled: false  # Same content as google-news-business (Google News topics are locale-independent for English)
    rate_limit_rpm: 3
    requires_auth: false
    tags: [market, corporate, uk, earnings]
    description: "Disabled — Google News Business topics return identical content regardless of gl= locale"

  # ============================================
  # FREE MARKET/COMPANY NEWS SOURCES
  # ============================================

  - id: cnbc-rss
    name: CNBC Top News
    domain: search.cnbc.com
    type: rss
    url: https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114
    parser: rss_generic
    priority: 1
    trust_level: premium
    enabled: false  # HTTP 503 on most networks — geo-restricted or rate-limited
    rate_limit_rpm: 5
    requires_auth: false
    tags: [general, corporate, market, earnings]
    description: "CNBC top financial news — disabled due to HTTP 503 geo-restriction"

  - id: marketwatch-rss
    name: MarketWatch Top Stories
    domain: feeds.content.dowjones.io
    type: rss
    url: https://feeds.content.dowjones.io/public/rss/mw_topstories
    parser: rss_generic
    priority: 2
    trust_level: standard
    enabled: true
    rate_limit_rpm: 5
    requires_auth: false
    tags: [general, corporate, market]
    description: "Dow Jones MarketWatch top stories — market and company news"

  - id: seekingalpha-rss
    name: Seeking Alpha Market News
    domain: seekingalpha.com
    type: rss
    url: https://seekingalpha.com/market_currents.xml
    parser: rss_generic
    priority: 2
    trust_level: standard
    enabled: true
    rate_limit_rpm: 3
    requires_auth: false
    tags: [corporate, earnings, analyst]
    description: "Seeking Alpha market currents — company news and analyst takes"

  - id: investing-rss
    name: Investing.com News
    domain: www.investing.com
    type: rss
    url: https://www.investing.com/rss/news.rss
    parser: rss_generic
    priority: 3
    trust_level: standard
    enabled: true
    rate_limit_rpm: 3
    requires_auth: false
    tags: [general, market, macro, corporate]
    description: "Investing.com aggregated financial news"

  # ============================================
  # API-KEY SOURCES (require keys in .env)
  # ============================================

  - id: newsapi-general
    name: NewsAPI Business
    domain: newsapi.org
    type: api
    url: https://newsapi.org/v2/top-headlines
    parser: newsapi
    priority: 3
    trust_level: standard
    enabled: false
    rate_limit_rpm: 2
    requires_auth: true
    auth_type: api_key
    auth_env_var: NEWSAPI_KEY
    auth_param_name: apiKey
    tags: [general, corporate]
    description: "Aggregated news from multiple outlets"
    notes: "Set NEWSAPI_KEY in ~/.axion.env and enable to fetch. NewsAPI's free tier is limited (~100 requests/day, development use); review newsapi.org for current terms."
    params:
      category: business
      language: en

  - id: finnhub-news
    name: Finnhub Market News
    domain: finnhub.io
    type: api
    url: https://finnhub.io/api/v1/news
    parser: finnhub
    priority: 2
    trust_level: standard
    enabled: false
    rate_limit_rpm: 30
    requires_auth: true
    auth_type: api_key
    auth_env_var: FINNHUB_KEY
    auth_param_name: token
    tags: [corporate, earnings, analyst]
    description: "Finnhub general market news"
    notes: "Set FINNHUB_KEY in ~/.axion.env and enable. Uses the general /news endpoint (works with a free Finnhub key)."
    params:
      category: general

  # ============================================
  # PHASE 9 — CORPORATE EVENTS (separate from News pipeline)
  # ============================================
  #
  # The ATHEX corporate-events source feeds the top-level "Events" tab,
  # NOT the Insights → News surface.  It is `unsupported: true` in the
  # default build because Athens Exchange does not publish a stable
  # machine-readable corporate-events feed at a public URL — every
  # attempt to scrape the HTML pages risks shape drift and breakage.
  # Until a reliable endpoint is wired, the Events tab is fed by the
  # manual CSV import path under /api/v1/corporate-events/import.
  #
  # Operators who do have a reliable internal endpoint can:
  #   1. Flip `unsupported: false`
  #   2. Set `url:` to that endpoint
  #   3. Implement the parser hook in src/corporate_events/athex.py
  # The Sources UI will surface this row with status="unsupported"
  # until then, which is the honest customer-facing label.
  - id: athex-corporate-events
    name: ATHEX Corporate Events
    domain: athexgroup.gr
    type: corporate_events
    url: https://www.athexgroup.gr/corporate-actions
    parser: athex_corporate_events
    priority: 3
    trust_level: premium
    enabled: false
    unsupported: true
    rate_limit_rpm: 4
    requires_auth: false
    tags: [corporate, calendar, greek, athex]
    description: "Athens Exchange corporate / issuer events feed for Greek-listed holdings"
    notes: "Phase 9 ships the table + UI + manual-import path. Automated ATHEX scraping is not enabled — Athens Exchange has no stable public machine-readable corporate-events endpoint. Use POST /api/v1/corporate-events/import to load a CSV."

